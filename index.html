  <style>
    :root {
      --bg: #f2f2f2;
      --panel: #ffffff;
      --ink: #050505;
      --text: #111111;
      --muted: #6f6f6f;
      --line: #d9d9d9;
      --line-strong: #111111;
      --soft: #ededed;
      --accent: #d9ff00;
      --cyan: #00e0ff;
      --pink: #ff4f9a;
      --orange: #ff6b00;
      --green: #34d399;
      --day: 92px;
      --sidebar: 228px;
      --head: 78px;
      --row: 44px;
      font-family: "Arial Narrow", "Helvetica Neue", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, .045) 1px, transparent 1px) 0 0 / 32px 32px,
        linear-gradient(rgba(0, 0, 0, .04) 1px, transparent 1px) 0 0 / 32px 32px,
        var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      color: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      min-width: 0;
      min-height: 0;
    }

    .topbar {
      min-height: 64px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 3px solid var(--ink);
      background: rgba(242, 242, 242, .96);
      box-shadow: 0 6px 0 rgba(0, 0, 0, .08);
      z-index: 50;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      background: var(--ink);
      color: #f2f2f2;
      font-family: "Arial Black", Impact, sans-serif;
      font-size: 15px;
      letter-spacing: -.04em;
    }

    .brand-copy {
      display: grid;
      gap: 1px;
      line-height: 1;
    }

    .brand-title {
      font-family: Impact, "Arial Black", sans-serif;
      font-size: 24px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .brand-subtitle {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
      white-space: nowrap;
    }

    .tab {
      height: 34px;
      display: inline-flex;
      align-items: center;
      padding: 0 14px;
      border: 2px solid var(--ink);
      background: var(--accent);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .spacer { flex: 1; }

    .tool-group {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .icon-btn,
    .text-btn,
    .select {
      height: 34px;
      border: 2px solid var(--ink);
      background: var(--panel);
      box-shadow: 3px 3px 0 var(--ink);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .icon-btn {
      width: 34px;
      display: grid;
      place-items: center;
      padding: 0;
      line-height: 1;
    }

    .text-btn {
      padding: 0 12px;
      white-space: nowrap;
    }

    .text-btn.primary {
      background: var(--ink);
      color: #fff;
      box-shadow: 3px 3px 0 var(--accent);
    }

    .text-btn.warn {
      background: #fff1f1;
      color: #8c1111;
    }

    .select {
      width: 150px;
      padding: 0 9px;
    }

    .zoom-label {
      min-width: 44px;
      text-align: center;
      font-family: Consolas, monospace;
      font-size: 12px;
      font-weight: 800;
    }

    .sync-status {
      min-width: 86px;
      padding: 7px 9px;
      border: 2px solid var(--ink);
      background: #fff;
      box-shadow: 3px 3px 0 var(--accent);
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
      text-align: center;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .sync-status.is-error {
      background: #fff1f1;
      color: #8c1111;
      box-shadow: 3px 3px 0 #ff4f9a;
    }

    .board {
      min-height: 0;
      display: grid;
      grid-template-columns: var(--sidebar) 1fr;
      overflow: auto;
      position: relative;
    }

    .app.is-booting .board {
      visibility: hidden;
    }

    .boot-screen {
      position: fixed;
      inset: 70px 0 0 0;
      display: grid;
      place-items: center;
      background: var(--paper);
      z-index: 60;
    }

    .boot-card {
      width: min(460px, calc(100vw - 40px));
      padding: 22px;
      border: 3px solid var(--ink);
      background: var(--accent);
      box-shadow: 8px 8px 0 var(--ink);
      font-weight: 900;
      text-transform: uppercase;
    }

    .boot-card span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .sidebar {
      position: sticky;
      left: 0;
      z-index: 25;
      background: var(--panel);
      border-right: 3px solid var(--ink);
      box-shadow: 8px 0 0 rgba(0, 0, 0, .06);
    }

    .corner {
      position: sticky;
      top: 0;
      height: var(--head);
      display: grid;
      align-content: center;
      gap: 4px;
      padding: 12px 14px;
      border-bottom: 3px solid var(--ink);
      background: var(--panel);
      z-index: 30;
    }

    .corner strong {
      font-family: Impact, "Arial Black", sans-serif;
      font-size: 26px;
      text-transform: uppercase;
      line-height: .9;
    }

    .corner span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .member-row {
      height: var(--row);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      font-weight: 900;
      text-transform: uppercase;
    }

    .avatar {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border: 2px solid var(--ink);
      background: var(--accent);
      font-size: 11px;
      box-shadow: 2px 2px 0 var(--ink);
      flex: 0 0 auto;
    }

    .timeline-wrap {
      min-width: 0;
      overflow: visible;
      background: rgba(255, 255, 255, .45);
    }

    .timeline {
      position: relative;
      min-width: max-content;
      min-height: 100%;
    }

    .months {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      height: var(--head);
      background: var(--panel);
      border-bottom: 3px solid var(--ink);
    }

    .month {
      border-right: 3px solid var(--ink);
    }

    .month-name {
      height: 34px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      border-bottom: 1px solid var(--line);
      background: var(--ink);
      color: #fff;
      font-family: Impact, "Arial Black", sans-serif;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .days {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: var(--day);
      height: 41px;
    }

    .day {
      display: grid;
      place-items: center;
      gap: 1px;
      border-right: 1px solid var(--line);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .day.weekend {
      background: #e8e8e8;
    }

    .day.today {
      background: var(--accent);
      color: var(--ink);
    }

    .day-number {
      font-size: 14px;
      line-height: 1;
    }

    .grid,
    .weekends,
    .bars {
      position: absolute;
      inset: var(--head) 0 0;
    }

    .grid {
      z-index: 1;
      background:
        repeating-linear-gradient(to right, transparent 0, transparent calc(var(--day) - 1px), rgba(0, 0, 0, .12) calc(var(--day) - 1px), rgba(0, 0, 0, .12) var(--day)),
        repeating-linear-gradient(to bottom, transparent 0, transparent calc(var(--row) - 1px), rgba(0, 0, 0, .12) calc(var(--row) - 1px), rgba(0, 0, 0, .12) var(--row));
      pointer-events: none;
    }

    .weekends {
      z-index: 2;
      pointer-events: none;
    }

    .weekend-band {
      position: absolute;
      top: 0;
      bottom: 0;
      background: rgba(0, 0, 0, .05);
      border-left: 1px solid rgba(0, 0, 0, .08);
      border-right: 1px solid rgba(0, 0, 0, .08);
    }

    .today-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--pink);
      z-index: 3;
      pointer-events: none;
    }

    .bars {
      z-index: 5;
    }

    .bar {
      position: absolute;
      height: 26px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      border: 2px solid var(--ink);
      background: var(--panel);
      box-shadow: 4px 4px 0 var(--ink);
      color: var(--text);
      overflow: hidden;
      user-select: none;
      touch-action: none;
      cursor: grab;
    }

    .bar.is-ooo {
      cursor: default;
      box-shadow: 3px 3px 0 var(--ink);
    }

    .bar.is-done {
      background: #e7ffe7;
    }

    .bar.is-done::after {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      top: 50%;
      height: 3px;
      background: currentColor;
      transform: rotate(-1deg);
    }

    .bar.is-dragging {
      opacity: .76;
      cursor: grabbing;
      z-index: 40;
    }

    .bar-status {
      width: 10px;
      height: 10px;
      border: 1px solid var(--ink);
      flex: 0 0 auto;
    }

    .bar-status-dot {
      width: 13px;
      height: 13px;
      border: 2px solid var(--ink);
      flex: 0 0 auto;
      display: none;
    }

    .bar-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .bar-meta {
      flex: 0 0 auto;
      margin-left: auto;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .bar-subtasks,
    .bar-label,
    .bar-member {
      flex: 0 0 auto;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--ink);
      background: #fff;
      color: var(--ink);
      font-size: 10px;
      font-weight: 900;
      line-height: 1;
      text-transform: uppercase;
    }

    .bar-subtasks {
      min-width: 30px;
      padding: 0 5px;
    }

    .bar-label {
      max-width: 150px;
      padding: 0 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bar-member {
      max-width: 74px;
      padding: 0 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .is-compact-overview .bar {
      height: 30px;
      gap: 5px;
      padding: 0 28px 0 8px;
      border-width: 2px;
      box-shadow: 2px 2px 0 var(--ink);
    }

    .is-compact-overview .bar-title {
      font-size: 11px;
      flex: 1 1 auto;
      min-width: 36px;
    }

    .is-compact-overview .bar-subtasks,
    .is-compact-overview .bar-label,
    .is-compact-overview .bar-delete {
      display: none;
    }

    .is-compact-overview .bar-status-dot {
      position: absolute;
      right: 7px;
      top: 50%;
      display: inline-block;
      transform: translateY(-50%);
    }

    .is-compact-overview .bar-member {
      max-width: 56px;
      height: 16px;
      padding: 0 4px;
      font-size: 9px;
    }

    .is-ultra-overview .bar {
      height: 26px;
      gap: 4px;
      padding: 0 24px 0 6px;
      box-shadow: 1px 1px 0 var(--ink);
    }

    .is-ultra-overview .bar-title {
      font-size: 10px;
      min-width: 24px;
    }

    .is-ultra-overview .bar-member {
      max-width: 42px;
      height: 14px;
      padding: 0 3px;
      font-size: 8px;
    }

    .is-ultra-overview .bar-status-dot {
      width: 10px;
      height: 10px;
      border-width: 1px;
    }

    .task-tooltip {
      position: fixed;
      left: 0;
      top: 0;
      max-width: 320px;
      padding: 9px 10px;
      border: 2px solid var(--ink);
      background: #fff;
      box-shadow: 4px 4px 0 var(--ink);
      color: var(--text);
      font-size: 12px;
      font-weight: 900;
      line-height: 1.35;
      text-transform: uppercase;
      white-space: pre-line;
      pointer-events: none;
      opacity: 0;
      transform: translate(-9999px, -9999px);
      z-index: 1000;
    }

    .task-tooltip.open {
      opacity: 1;
    }

    .bar-delete {
      flex: 0 0 auto;
      width: 20px;
      height: 20px;
      display: grid;
      place-items: center;
      border: 1px solid var(--ink);
      background: #fff1f1;
      color: #8c1111;
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
      box-shadow: none;
    }

    .empty {
      position: absolute;
      left: 24px;
      top: calc(var(--head) + 24px);
      width: min(460px, calc(100vw - 80px));
      padding: 18px;
      border: 3px solid var(--ink);
      background: var(--accent);
      box-shadow: 6px 6px 0 var(--ink);
      z-index: 8;
      font-weight: 900;
      text-transform: uppercase;
    }

    .drawer,
    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 100;
    }

    .modal-backdrop.open,
    .drawer.open {
      display: block;
    }

    .modal-backdrop {
      background: rgba(0, 0, 0, .55);
    }

    .modal {
      position: absolute;
      right: 18px;
      top: 18px;
      width: min(520px, calc(100vw - 36px));
      max-height: calc(100vh - 36px);
      overflow: auto;
      border: 3px solid var(--ink);
      background: var(--panel);
      box-shadow: 8px 8px 0 var(--accent);
    }

    .modal-head {
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 3px solid var(--ink);
      background: var(--ink);
      color: #fff;
    }

    .modal-head h2 {
      margin: 0;
      font-family: Impact, "Arial Black", sans-serif;
      font-size: 28px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .modal-body {
      display: grid;
      gap: 14px;
      padding: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .field.full { grid-column: 1 / -1; }
    .field.is-hidden { display: none; }

    label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
    }

    input,
    select,
    textarea {
      min-width: 0;
      border: 2px solid var(--ink);
      background: #fff;
      padding: 9px 10px;
      font-size: 14px;
      font-weight: 800;
    }

    textarea {
      min-height: 82px;
      resize: vertical;
    }

    input[type="color"] {
      height: 42px;
      padding: 4px;
    }

    .check-line {
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 2px solid var(--ink);
      background: #fff;
      padding: 8px 10px;
      color: var(--text);
      font-size: 13px;
    }

    .check-line input {
      width: 18px;
      height: 18px;
      padding: 0;
      accent-color: var(--accent);
    }

    .member-picker {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 8px;
      min-height: 42px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding-top: 4px;
    }

    .settings-list {
      display: grid;
      gap: 8px;
    }

    .settings-row {
      display: grid;
      grid-template-columns: 1fr 48px 48px 34px;
      gap: 8px;
      align-items: center;
    }

    .history-list {
      display: grid;
      gap: 8px;
    }

    .history-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 2px solid var(--ink);
      background: #fff;
    }

    .history-row strong {
      display: block;
      font-size: 13px;
      text-transform: uppercase;
    }

    .history-row span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    select[multiple] {
      min-height: 96px;
    }

    .subtask-panel {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 2px solid var(--ink);
      background: var(--soft);
    }

    .subtask-row {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr) minmax(120px, .7fr) 34px;
      gap: 8px;
      align-items: center;
    }

    .subtask-row input[type="checkbox"] {
      width: 22px;
      height: 22px;

  <script type="module">
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyCq4dqoSiAe-_mAVxBGOkuS8U54-xZgoNs",
      authDomain: "o-tacos-gantt.firebaseapp.com",
      projectId: "o-tacos-gantt",
      storageBucket: "o-tacos-gantt.firebasestorage.app",
      messagingSenderId: "255539789734",
      appId: "1:255539789734:web:fe6d85009c029b61fdd967",
      measurementId: "G-22GLYLHKKD"
    };

    const DAY_MS = 24 * 60 * 60 * 1000;
    const storageKey = "noku-gantt-data-v16";
    const stableStorageKey = "noku-gantt-data-current";
    const legacyStorageKeys = ["noku-gantt-data-v15", "noku-gantt-data-v14", "noku-gantt-data-v13", "noku-gantt-data-v12", "noku-gantt-data-v11", "noku-gantt-data-v10", "noku-gantt-data-v9", "noku-gantt-data-v8", "noku-gantt-data-v7", "noku-gantt-data-v6", "noku-gantt-data-v5", "noku-gantt-data-v4", "noku-gantt-data-v3", "noku-gantt-data-v2", "noku-gantt-data-v1"];
    const historyKey = "noku-gantt-history-v16";
    const backupKey = "noku-gantt-backups-v1";
    const revisionKey = "noku-gantt-revision-v1";
    const remoteBoardId = "noku-gantt";
    const oooProjectId = "__ooo__";
    const weekday = ["dom", "lun", "mar", "mer", "gio", "ven", "sab"];
    const monthNames = ["gennaio", "febbraio", "marzo", "aprile", "maggio", "giugno", "luglio", "agosto", "settembre", "ottobre", "novembre", "dicembre"];
    const colors = ["#d9ff00", "#00e0ff", "#ff4f9a", "#ff6b00", "#34d399", "#c084fc", "#facc15"];

    const today = stripTime(new Date());
    const starterData = {
      projects: [
        { id: "brand-platform", name: "Brand platform", color: "#d9ff00" },
        { id: "content-engine", name: "Content engine", color: "#00e0ff" },
        { id: "paid-media", name: "Paid media", color: "#ff4f9a" }
      ],
      members: [
        { name: "Strategy", color: "#d9ff00" },
        { name: "Creative", color: "#00e0ff" },
        { name: "Social", color: "#ff4f9a" },
        { name: "Media", color: "#ff6b00" },
        { name: "Production", color: "#34d399" }
      ],
      statuses: [
        { name: "Backlog", color: "#cfcfcf" },
        { name: "In corso", color: "#d9ff00" },
        { name: "Review", color: "#00e0ff" },
        { name: "Live", color: "#34d399" }
      ],
      tasks: [
        taskSeed("Kickoff e perimetro", "brand-platform", "Strategy", -4, 4, "In corso"),
        taskSeed("Concept visual", "brand-platform", "Creative", 2, 12, "Backlog"),
        taskSeed("Piano editoriale", "content-engine", "Social", 5, 22, "In corso"),
        taskSeed("Setup campagne", "paid-media", "Media", 10, 24, "Review"),
        taskSeed("Shooting assets", "content-engine", "Production", 18, 30, "Backlog")
      ],
      ooo: [],
      oooSettings: { color: "#111111", textColor: "#ffffff" }
    };

    let data = loadData();
    let lastSavedData = cloneData(data);
    let zoom = clampZoom(Number(safeStorageGet("noku-gantt-zoom") || 1));
    let dragState = null;
    let currentLaneLayout = { taskLanes: new Map(), maxLanes: 1 };
    let history = loadHistory();
    saveBackup("Apertura app", data);

    const appRoot = document.getElementById("appRoot");
    const bootScreen = document.getElementById("bootScreen");
    const board = document.getElementById("board");
    const timeline = document.getElementById("timeline");
    const monthsEl = document.getElementById("months");
    const rowsEl = document.getElementById("rows");
    const barsEl = document.getElementById("bars");
    const gridEl = document.getElementById("grid");
    const weekendsEl = document.getElementById("weekends");
    const viewFilter = document.getElementById("viewFilter");
    const contextMenu = document.getElementById("contextMenu");
    const subtaskList = document.getElementById("subtaskList");
    const undoBtn = document.getElementById("undoBtn");
    const historyList = document.getElementById("historyList");
    const syncStatus = document.getElementById("syncStatus");
    const taskTooltip = document.getElementById("taskTooltip");
    let contextTaskId = "";
    let boardRef = null;
    let unsubscribeBoard = null;
    let remoteApi = null;
    let saveQueue = Promise.resolve();
    let remoteReady = false;
    let applyingRemoteUpdate = false;
    let pendingRemoteSave = false;
    let dataRevision = Number(safeStorageGet(revisionKey) || 0);
    let hasRendered = false;

    function taskSeed(name, projectId, member, startOffset, endOffset, status) {
      return {
        id: crypto.randomUUID ? crypto.randomUUID() : `task-${Math.random().toString(16).slice(2)}`,
        name,
        projectId,
        members: [member],
        start: iso(addDays(today, startOffset)),
        end: iso(addDays(today, endOffset)),
        hasEnd: endOffset !== startOffset,
        status,
        done: false,
        notes: "",
        subtasks: [
          { id: `sub-${Math.random().toString(16).slice(2)}`, title: "Brief", done: false },
          { id: `sub-${Math.random().toString(16).slice(2)}`, title: "Review", done: false }
        ]
      };
    }

    function allDataKeys() {
      const known = [stableStorageKey, storageKey, ...legacyStorageKeys];
      try {
        for (let index = 0; index < localStorage.length; index += 1) {
          const key = localStorage.key(index);
          if (key && key.startsWith("noku-gantt-data") && !known.includes(key)) known.push(key);
        }
      } catch (error) {
        console.warn(error);
      }
      return known;
    }

    function dataScore(candidate) {
      if (!candidate || !Array.isArray(candidate.tasks)) return -1;
      const starterTaskNames = new Set(starterData.tasks.map((task) => task.name));
      const starterProjectNames = new Set(starterData.projects.map((project) => project.name));
      const starterMatches = candidate.tasks.filter((task) => starterTaskNames.has(task.name)).length;
      const projectMatches = (candidate.projects || []).filter((project) => starterProjectNames.has(project.name)).length;
      const looksStarter = starterMatches >= starterData.tasks.length - 1 && projectMatches >= starterData.projects.length - 1;
      const customTasks = candidate.tasks.filter((task) => !starterTaskNames.has(task.name)).length;
      return (candidate.tasks.length * 100) + ((candidate.projects || []).length * 20) + ((candidate.members || []).length * 10) + ((candidate.statuses || []).length * 10) + (customTasks * 250) + (looksStarter ? -500 : 500);
    }

    function dataCandidates() {
      const candidates = [];
      allDataKeys().forEach((key) => {
        try {
          const saved = JSON.parse(safeStorageGet(key));
          if (saved && Array.isArray(saved.tasks)) {
            candidates.push({ key, data: normalizeData(saved), score: dataScore(saved) });
          }
        } catch (error) {
          console.warn(error);
        }
      });
      return candidates.sort((a, b) => b.score - a.score);
    }

    function migrateLegacyData() {
      const best = dataCandidates()[0];
      if (!best) return null;
      const serialized = JSON.stringify(best.data);
      safeStorageSet(storageKey, serialized);
      safeStorageSet(stableStorageKey, serialized);
      return best.data;
    }

    function loadData() {
      try {
        const migrated = migrateLegacyData();
        if (migrated) return migrated;
      } catch (error) {
        console.warn(error);
      }
      return resetToStarterData();
    }

    function resetToStarterData() {
      const fresh = normalizeData(structuredClone(starterData));
      safeStorageSet(storageKey, JSON.stringify(fresh));
      safeStorageSet(stableStorageKey, JSON.stringify(fresh));
      return fresh;
    }

    function normalizeData(source) {
      const normalized = {
        projects: Array.isArray(source.projects) && source.projects.length ? source.projects.map(normalizeProject) : structuredClone(starterData.projects),
        members: Array.isArray(source.members) && source.members.length ? source.members.map(normalizeMember) : structuredClone(starterData.members),
        statuses: Array.isArray(source.statuses) && source.statuses.length ? source.statuses.map(normalizeStatus) : structuredClone(starterData.statuses),
        tasks: Array.isArray(source.tasks) ? source.tasks : [],
        ooo: Array.isArray(source.ooo) ? source.ooo : [],
        oooSettings: normalizeOooSettings(source.oooSettings)
      };
      normalized.tasks = normalized.tasks.map((task) => {
        const taskStatus = normalized.statuses.some((status) => status.name === task.status) ? task.status : normalized.statuses[0]?.name || "";
        const taskMembers = Array.isArray(task.members) && task.members.length ? task.members : (task.member ? [task.member] : [normalized.members[0]?.name].filter(Boolean));
        return {
          ...task,
          id: task.id || `task-${Math.random().toString(16).slice(2)}`,
          name: task.name || "Nuovo task",
          projectId: normalized.projects.some((project) => project.id === task.projectId) ? task.projectId : normalized.projects[0]?.id || "",
          members: taskMembers,
          start: task.start || iso(today),
          end: task.hasEnd === false ? (task.start || iso(today)) : (task.end || task.start || iso(today)),
          hasEnd: task.hasEnd === true || Boolean(task.end && task.start && task.end !== task.start),
          status: taskStatus,
          done: isDoneStatus(taskStatus),
          notes: task.notes || "",
          subtasks: Array.isArray(task.subtasks) ? task.subtasks.map((subtask) => ({
            id: subtask.id || `sub-${Math.random().toString(16).slice(2)}`,
            title: subtask.title || subtask.name || "Sottotask",
            done: Boolean(subtask.done),
            members: Array.isArray(subtask.members) ? subtask.members : (subtask.member ? [subtask.member] : [])
          })) : []
        };
      });
      normalized.ooo = normalized.ooo.map((entry) => {
        const memberName = normalized.members.some((member) => member.name === entry.member) ? entry.member : normalized.members[0]?.name || "";
        const start = entry.start || iso(today);
        const end = entry.hasEnd === false ? start : (entry.end || start);
        return {
          id: entry.id || `ooo-${Math.random().toString(16).slice(2)}`,
          member: memberName,
          start,
          end,
          hasEnd: entry.hasEnd === true || Boolean(end && start && end !== start)
        };
      }).filter((entry) => entry.member);
      return normalized;
    }

    function normalizeProject(project, index = 0) {
      const fallback = starterData.projects[index % starterData.projects.length];
      const name = (typeof project === "string" ? project : project?.name || fallback.name).trim();
      return {
        id: project?.id || slug(name) || fallback.id,
        name: name || fallback.name,
        color: project?.color || fallback.color || colors[index % colors.length],
        textColor: project?.textColor || fallback.textColor || "#111111"
      };
    }

    function normalizeMember(member, index = 0) {
      if (typeof member === "string") return { name: member, color: colors[index % colors.length], textColor: "#111111" };
      return {
        name: member?.name || `Team ${index + 1}`,
        color: member?.color || colors[index % colors.length],
        textColor: member?.textColor || "#111111"
      };
    }

    function normalizeStatus(status, index = 0) {
      if (typeof status === "string") return { name: status, color: colors[index % colors.length], textColor: "#111111" };
      return {
        name: status?.name || starterData.statuses[index % starterData.statuses.length]?.name || `Status ${index + 1}`,
        color: status?.color || starterData.statuses[index % starterData.statuses.length]?.color || colors[index % colors.length],
        textColor: status?.textColor || starterData.statuses[index % starterData.statuses.length]?.textColor || "#111111"
      };
    }

    function normalizeOooSettings(settings = {}) {
      return {
        color: settings?.color || starterData.oooSettings.color,
        textColor: settings?.textColor || starterData.oooSettings.textColor
      };
    }

    function isDoneStatus(statusName) {
      return /^(done|completat[oa]|chius[oa])$/i.test(String(statusName || "").trim());
    }

    function safeStorageGet(key) {
      try {
        return localStorage.getItem(key);
      } catch (error) {
        console.warn(error);
        return null;
      }
    }

    function safeStorageSet(key, value) {
      try {
        localStorage.setItem(key, value);
      } catch (error) {
        console.warn(error);
      }
    }

    function safeStorageRemove(key) {
      try {
        localStorage.removeItem(key);
      } catch (error) {
        console.warn(error);
      }
    }

    function cloneData(value) {
      return normalizeData(structuredClone(value));
    }

    function dataSignature(value) {
      return JSON.stringify(value);
    }

    function loadHistory() {
      try {
        const saved = JSON.parse(safeStorageGet(historyKey));
        if (Array.isArray(saved)) {
          return saved.filter((entry) => entry?.snapshot).slice(0, 10);
        }
      } catch (error) {
        console.warn(error);
      }
      return [];
    }

    function loadBackups() {
      try {
        const saved = JSON.parse(safeStorageGet(backupKey));
        if (Array.isArray(saved)) {
          return saved.filter((entry) => entry?.snapshot).slice(0, 20);
        }
      } catch (error) {
        console.warn(error);
      }
      return [];
    }

    function saveBackup(label, snapshot) {
      if (!snapshot || !Array.isArray(snapshot.tasks)) return;
      const normalized = normalizeData(cloneData(snapshot));
      const backups = loadBackups();
      const signature = dataSignature(normalized);
      if (backups[0] && dataSignature(backups[0].snapshot) === signature) return;
      backups.unshift({
        id: `backup-${Date.now()}-${Math.random().toString(16).slice(2)}`,
        label,
        time: Date.now(),
        snapshot: normalized
      });
      safeStorageSet(backupKey, JSON.stringify(backups.slice(0, 20)));
    }

    function saveHistory() {
      safeStorageSet(historyKey, JSON.stringify(history.slice(0, 10)));
      updateUndoButton();
    }

    function updateUndoButton() {
      if (!undoBtn) return;
      undoBtn.disabled = !history.length;
      undoBtn.title = history.length ? `Annulla: ${history[0].label}` : "Nessuna operazione da annullare";
    }

    function setSyncMessage(message, isError = false) {
      if (!syncStatus) return;
      syncStatus.textContent = message;
      syncStatus.classList.toggle("is-error", Boolean(isError));
      syncStatus.title = isError ? `Salvataggio condiviso: ${message}` : `Salvataggio condiviso: ${message}`;
    }

    function cleanForRemote(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function writeLocalSnapshot(snapshotData = data, snapshotHistory = history, revision = dataRevision) {
      const normalized = normalizeData(snapshotData);
      safeStorageSet(storageKey, JSON.stringify(normalized));
      safeStorageSet(stableStorageKey, JSON.stringify(normalized));
      safeStorageSet(historyKey, JSON.stringify((snapshotHistory || []).slice(0, 10)));
      safeStorageSet(revisionKey, String(revision || 0));
    }

    function withTimeout(promise, milliseconds, label) {
      let timer;
      const timeout = new Promise((_, reject) => {
        timer = window.setTimeout(() => reject(new Error(label || "Timeout")), milliseconds);
      });
      return Promise.race([promise, timeout]).finally(() => window.clearTimeout(timer));
    }

    function pushHistory(label) {
      const before = cloneData(lastSavedData);
      if (dataSignature(before) === dataSignature(data)) return;
      const now = Date.now();
      const last = history[0];
      if (label === "Modifica setup" && last && last.label === label && now - last.time < 1500) {
        saveHistory();
        return;
      }
      history.unshift({
        id: `hist-${now}-${Math.random().toString(16).slice(2)}`,
        label,
        time: now,
        snapshot: before
      });
      history = history.slice(0, 10);
      saveHistory();
    }

    async function startRemoteSync() {
      setSyncMessage("Connessione...");
      try {
        const [{ initializeApp }, { getAuth, signInAnonymously }, firestore] = await withTimeout(Promise.all([
          import("https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js"),
          import("https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js"),
          import("https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js")
        ]), 8000, "Firebase non raggiungibile");
        const { doc, getDoc, getFirestore, onSnapshot, serverTimestamp, setDoc } = firestore;
        remoteApi = { serverTimestamp, setDoc };
        const app = initializeApp(FIREBASE_CONFIG);
        const auth = getAuth(app);
        await withTimeout(signInAnonymously(auth), 8000, "Login Firebase non riuscito");
        const db = getFirestore(app);
        boardRef = doc(db, "boards", remoteBoardId);
        const snapshot = await withTimeout(getDoc(boardRef), 8000, "Lettura Firebase non riuscita");
        if (!snapshot.exists()) {
          dataRevision = Math.max(Date.now(), dataRevision + 1);
          await remoteApi.setDoc(boardRef, {
            data: cleanForRemote(normalizeData(data)),
            history: cleanForRemote(history.slice(0, 10)),
            revision: dataRevision,
            updatedAt: remoteApi.serverTimestamp()
          });
          writeLocalSnapshot(data, history, dataRevision);
          scheduleScrollToToday();
        } else {
          applyRemoteDocument(snapshot.data(), true);
        }
        unsubscribeBoard = onSnapshot(boardRef, (remoteSnapshot) => {
          if (!remoteSnapshot.exists() || applyingRemoteUpdate) return;
          applyRemoteDocument(remoteSnapshot.data(), false);
        }, (error) => {
          console.error("Firestore snapshot failed", error);
          setSyncMessage("Errore online", true);
        });
        remoteReady = true;
        setSyncMessage("Online");
        if (pendingRemoteSave) {
          pendingRemoteSave = false;
          queueRemoteSave("Sincronizza modifiche locali");
        }
      } catch (error) {
        console.error("Firebase load failed", error);
        remoteReady = false;
        setSyncMessage("Solo locale", true);
      }
    }

    function applyRemoteDocument(remoteDoc, force = false) {
      const remoteRevision = Number(remoteDoc?.revision || 0);
      if (!force && remoteRevision <= dataRevision) return;
      const remoteData = remoteDoc?.data;
      if (!remoteData || !Array.isArray(remoteData.tasks)) return;
      data = normalizeData(remoteData);
      history = Array.isArray(remoteDoc.history) ? remoteDoc.history.slice(0, 10) : history;
      dataRevision = remoteRevision;
      lastSavedData = cloneData(data);
      writeLocalSnapshot(data, history, dataRevision);
      saveBackup("Aggiornamento online", data);
      render();
      if (force) scheduleScrollToToday();
      setSyncMessage("Online");
    }

    function queueRemoteSave(label = "Modifica") {
      if (!boardRef || !remoteReady || !remoteApi) {
        pendingRemoteSave = true;
        setSyncMessage("In attesa", true);
        return;
      }
      const snapshotData = cleanForRemote(normalizeData(data));
      const snapshotHistory = cleanForRemote(history.slice(0, 10));
      const nextRevision = Math.max(Date.now(), dataRevision + 1);
      dataRevision = nextRevision;
      writeLocalSnapshot(snapshotData, snapshotHistory, dataRevision);
      saveQueue = saveQueue.catch(() => {}).then(async () => {
        try {
          setSyncMessage("Salvataggio...");
          applyingRemoteUpdate = true;
          await remoteApi.setDoc(boardRef, {
            data: snapshotData,
            history: snapshotHistory,
            revision: nextRevision,
            updatedAt: remoteApi.serverTimestamp()
          }, { merge: true });
          applyingRemoteUpdate = false;
          setSyncMessage("Online");
        } catch (error) {
          applyingRemoteUpdate = false;
          pendingRemoteSave = true;
          console.error("Firestore save failed", error);
          setSyncMessage("Errore save", true);
        }
      });
    }

    function saveData(label = "Modifica") {
      saveBackup(`Prima di ${label}`, lastSavedData);
      pushHistory(label);
      writeLocalSnapshot(data, history, dataRevision);
      saveBackup(label, data);
      lastSavedData = cloneData(data);
      queueRemoteSave(label);
    }

    function saveAndRefresh(options = {}) {
      saveData();
      renderFilters();
      currentLaneLayout = buildLaneLayout(visibleRows(), visibleTimelineItems());
      document.documentElement.style.setProperty("--row", `${rowHeightForLanes(currentLaneLayout.maxLanes)}px`);
      renderRows();
      renderTimeline();
      renderFormOptions();
      if (options.settings !== false) renderSettings();
    }

    function formatHistoryTime(time) {
      return new Date(time).toLocaleString("it-IT", {
        day: "2-digit",
        month: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function renderHistory() {
      updateUndoButton();
      if (!historyList) return;
      const backups = loadBackups();
      const storedVersions = dataCandidates();
      const historyHtml = history.length ? history.map((entry, index) => `
        <div class="history-row">
          <div>
            <strong>${escapeHtml(entry.label)}</strong>
            <span>${formatHistoryTime(entry.time)} · ${entry.snapshot.tasks.length} task · ${entry.snapshot.projects.length} progetti</span>
          </div>
          <button class="text-btn" type="button" data-restore-history="${index}">Ripristina</button>
        </div>
      `).join("") : `<div class="history-row"><div><strong>Nessuna modifica precedente</strong><span>Da ora in poi le modifiche verranno archiviate automaticamente.</span></div></div>`;
      const backupHtml = backups.length ? backups.map((entry, index) => `
        <div class="history-row">
          <div>
            <strong>Backup · ${escapeHtml(entry.label)}</strong>
            <span>${formatHistoryTime(entry.time)} · ${entry.snapshot.tasks.length} task · ${entry.snapshot.projects.length} progetti</span>
          </div>
          <button class="text-btn" type="button" data-restore-backup="${index}">Ripristina</button>
        </div>
      `).join("") : "";
      const storedHtml = storedVersions.map((entry) => `
        <div class="history-row">
          <div>
            <strong>Archivio browser · ${escapeHtml(entry.key)}</strong>
            <span>${entry.data.tasks.length} task · ${entry.data.projects.length} progetti · punteggio ${entry.score}</span>
          </div>
          <button class="text-btn" type="button" data-restore-storage="${escapeAttr(entry.key)}">Ripristina</button>
        </div>
      `).join("");
      historyList.innerHTML = `
        <div class="settings-title"><h3>Backup manuale</h3></div>
        <div class="history-row">
          <div>
            <strong>Archivio JSON</strong>
            <span>Solo emergenza: i dati principali restano online.</span>
          </div>
          <div class="modal-actions">
            <button class="text-btn" type="button" data-export-data>Esporta</button>
            <button class="text-btn" type="button" data-import-data>Importa</button>
          </div>
        </div>
        <div class="settings-title"><h3>Ultime modifiche</h3></div>
        ${historyHtml}
        <div class="settings-title"><h3>Backup automatici</h3></div>
        ${backupHtml || `<div class="history-row"><div><strong>Nessun backup ancora</strong><span>Il prossimo salvataggio ne creera uno.</span></div></div>`}
        <div class="settings-title"><h3>Versioni salvate nel browser</h3></div>
        ${storedHtml || `<div class="history-row"><div><strong>Nessuna versione trovata</strong><span>Non ci sono altri archivi locali disponibili.</span></div></div>`}
      `;
    }

    function restoreHistory(index, options = {}) {
      const entry = history[index];
      if (!entry) return;
      const current = cloneData(data);
      data = cloneData(entry.snapshot);
      history.splice(index, 1);
      if (options.keepCurrent !== false && dataSignature(current) !== dataSignature(data)) {
        history.unshift({
          id: `hist-${Date.now()}-${Math.random().toString(16).slice(2)}`,
          label: "Prima del ripristino",
          time: Date.now(),
          snapshot: current
        });
      }
      history = history.slice(0, 10);
      saveBackup("Ripristino cronologia", data);
      lastSavedData = cloneData(data);
      saveHistory();
      queueRemoteSave("Ripristino cronologia");
      render();
    }

    function restoreSnapshot(snapshot, label = "Ripristino backup") {
      if (!snapshot || !Array.isArray(snapshot.tasks)) return;
      saveBackup("Prima del ripristino", data);
      data = normalizeData(cloneData(snapshot));
      saveBackup(label, data);
      saveData(label);
      render();
    }

    function exportData() {
      const payload = {
        app: "noku-gantt",
        exportedAt: new Date().toISOString(),
        version: window.NOKU_APP_VERSION || "v34",
        data: normalizeData(cloneData(data)),
        history: history.slice(0, 10),
        backups: loadBackups().slice(0, 20)
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `noku-gantt-backup-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function importDataFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.addEventListener("load", () => {
        try {
          const parsed = JSON.parse(String(reader.result || "{}"));
          const imported = parsed.data && Array.isArray(parsed.data.tasks) ? parsed.data : parsed;
          if (!imported || !Array.isArray(imported.tasks)) {
            window.alert("Il file non sembra un backup valido di NOku Gantt.");
            return;
          }
          restoreSnapshot(imported, "Import backup JSON");
          if (Array.isArray(parsed.history)) {
            history = parsed.history.filter((entry) => entry?.snapshot).slice(0, 10);
            saveHistory();
          }
          if (Array.isArray(parsed.backups)) {
            safeStorageSet(backupKey, JSON.stringify(parsed.backups.filter((entry) => entry?.snapshot).slice(0, 20)));
          }
          render();
        } catch (error) {
          console.error(error);
          window.alert("Non riesco a leggere questo backup JSON.");
        }
      });
      reader.readAsText(file);
    }

    function undoLastChange() {
      restoreHistory(0, { keepCurrent: false });
    }

    function stripTime(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function parseDate(value) {
      const [year, month, day] = value.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function iso(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function addDays(date, amount) {
      const next = new Date(date);
      next.setDate(next.getDate() + amount);
      return next;
    }

    function diffDays(a, b) {
      return Math.round((stripTime(a) - stripTime(b)) / DAY_MS);
    }

    function daysBetween(start, end) {
      return Math.max(1, diffDays(end, start) + 1);
    }

    function dayWidth() {
      return Number(getComputedStyle(document.documentElement).getPropertyValue("--day").replace("px", ""));
    }

    function clampZoom(value) {
      if (!Number.isFinite(value)) return 1;
      return Math.max(.25, Math.min(3, value));
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function rowHeight() {
      return Number(getComputedStyle(document.documentElement).getPropertyValue("--row").replace("px", ""));
    }

    function rowHeightForLanes(lanes) {
      return Math.max(42, 10 + (Math.max(1, lanes) * 32));
    }

    function buildLaneLayout(projects, tasks = visibleTasks()) {
      const taskLanes = new Map();
      let maxLanes = 1;
      projects.forEach((project) => {
        const lanes = [];
        tasks
          .filter((task) => task.projectId === project.id)
          .sort((a, b) => parseDate(a.start) - parseDate(b.start) || parseDate(a.end) - parseDate(b.end))
          .forEach((task) => {
            const start = parseDate(task.start);
            const end = parseDate(task.end);
            let laneIndex = lanes.findIndex((laneEnd) => diffDays(start, laneEnd) > 0);
            if (laneIndex === -1) {
              laneIndex = lanes.length;
              lanes.push(end);
            } else {
              lanes[laneIndex] = end;
            }
            taskLanes.set(task.id, laneIndex);
          });
        maxLanes = Math.max(maxLanes, lanes.length || 1);
      });
      return { taskLanes, maxLanes };
    }

    function rangeForTasks(tasks = visibleTasks()) {
      const taskDates = tasks.flatMap((task) => [parseDate(task.start), parseDate(task.end)]);
      const min = taskDates.length ? new Date(Math.min(...taskDates)) : today;
      const max = taskDates.length ? new Date(Math.max(...taskDates)) : today;
      const start = new Date(min.getFullYear(), min.getMonth(), 1);
      start.setDate(start.getDate() - 7);
      const end = new Date(max.getFullYear(), max.getMonth() + 1, 0);
      end.setDate(end.getDate() + 14);
      const requiredEnd = new Date(2026, 11, 31);
      if (end < requiredEnd) end.setTime(requiredEnd.getTime());
      return { start, end, totalDays: daysBetween(start, end) };
    }

    function visibleProjects() {
      return data.projects;
    }

    function visibleOoo() {
      const member = selectedMember();
      return member ? data.ooo.filter((entry) => entry.member === member) : data.ooo;
    }

    function visibleRows() {
      const oooRows = visibleOoo().length ? [{ id: oooProjectId, name: "OOO", color: data.oooSettings?.color || "#111111", textColor: data.oooSettings?.textColor || "#ffffff", isOoo: true }] : [];
      return [...oooRows, ...visibleProjects()];
    }

    function visibleTimelineItems() {
      const oooItems = visibleOoo().map((entry) => ({
        ...entry,
        name: entry.member,
        projectId: oooProjectId,
        type: "ooo"
      }));
      return [...oooItems, ...visibleTasks()];
    }

    function selectedMember() {
      return viewFilter.value?.startsWith("member:")
        ? viewFilter.value.slice("member:".length)
        : "";
    }

    function visibleTasks() {
      const member = selectedMember();
      return member ? data.tasks.filter((task) => (task.members || []).includes(member)) : data.tasks;
    }

    function isCompactOverview() {
      return zoom <= .5;
    }

    function isUltraOverview() {
      return zoom <= .25;
    }

    function previewWidth(task, status) {
      if (isUltraOverview()) return 110;
      if (isCompactOverview()) {
        return 138;
      }
      const title = String(task.name || "").length * 10;
      const statusWidth = String(status?.name || "").length * 8 + 34;
      const membersWidth = (task.members || []).reduce((total, member) => total + Math.min(108, String(member).length * 8 + 26), 0);
      const subtaskWidth = task.subtasks?.length ? 42 : 0;
      return Math.min(760, Math.max(160, title + statusWidth + membersWidth + subtaskWidth + 116));
    }

    function requiredDayWidth() {
      const widths = visibleTimelineItems().map((task) => {
        if (daysBetween(parseDate(task.start), parseDate(task.end)) !== 1) return 0;
        const status = data.statuses.find((item) => item.name === task.status) || data.statuses[0];
        return task.type === "ooo" ? 110 : previewWidth(task, status) + 16;
      });
      return Math.max(0, ...widths);
    }

    function render() {
      applyZoom();
      renderFilters();
      currentLaneLayout = buildLaneLayout(visibleRows(), visibleTimelineItems());
      document.documentElement.style.setProperty("--row", `${rowHeightForLanes(currentLaneLayout.maxLanes)}px`);
      renderRows();
      renderTimeline();
      renderFormOptions();
      renderSettings();
      renderHistory();
      hasRendered = true;
      appRoot.classList.remove("is-booting");
      bootScreen?.remove();
    }

    function applyZoom() {
      const baseWidth = Math.round(92 * zoom);
      document.documentElement.classList.toggle("is-compact-overview", isCompactOverview());
      document.documentElement.classList.toggle("is-ultra-overview", isUltraOverview());
      const minOverviewWidth = isUltraOverview() ? 126 : (isCompactOverview() ? 154 : 0);
      document.documentElement.style.setProperty("--day", `${Math.max(baseWidth, requiredDayWidth(), minOverviewWidth)}px`);
      document.getElementById("zoomLabel").textContent = `${Math.round(zoom * 100)}%`;
    }

    function renderFilters() {
      const current = viewFilter.value || "overview";
      const counts = data.members.map((member) => {
        const count = data.tasks.filter((task) => (task.members || []).includes(member.name)).length;
        return `<option value="member:${escapeAttr(member.name)}">${escapeHtml(member.name)} (${count})</option>`;
      }).join("");
      viewFilter.innerHTML = `<option value="overview">Overview</option>${counts}`;
      viewFilter.value = current === "overview" || data.members.some((member) => `member:${member.name}` === current) ? current : "overview";
    }

    function renderRows() {
      rowsEl.innerHTML = visibleRows().map((project) => `
        <div class="member-row">
          <span class="avatar" style="background:${project.color};color:${project.textColor || "#111111"}">${initials(project.name)}</span>
          <span>${escapeHtml(project.name)}</span>
        </div>
      `).join("");
    }

    function renderTimeline() {
      const range = rangeForTasks(visibleTimelineItems());
      const width = range.totalDays * dayWidth();
      const height = visibleRows().length * rowHeight();
      timeline.style.width = `${width}px`;
      timeline.style.height = `${height + 78}px`;
      gridEl.style.height = `${height}px`;
      weekendsEl.style.height = `${height}px`;
      monthsEl.innerHTML = monthBlocks(range).join("");
      weekendsEl.innerHTML = weekendBands(range, height).join("") + todayMarker(range, height);
      renderBars(range);
    }

    function monthBlocks(range) {
      const blocks = [];
      let cursor = new Date(range.start.getFullYear(), range.start.getMonth(), 1);
      while (cursor <= range.end) {
        const monthStart = new Date(cursor);
        const monthEnd = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 0);
        const visibleStart = monthStart < range.start ? range.start : monthStart;
        const visibleEnd = monthEnd > range.end ? range.end : monthEnd;
        const count = daysBetween(visibleStart, visibleEnd);
        const days = [];
        for (let i = 0; i < count; i += 1) {
          const date = addDays(visibleStart, i);
          const classes = ["day"];
          if (date.getDay() === 0 || date.getDay() === 6) classes.push("weekend");
          if (iso(date) === iso(today)) classes.push("today");
          days.push(`<div class="${classes.join(" ")}"><span>${weekday[date.getDay()]}</span><span class="day-number">${date.getDate()}</span></div>`);
        }
        blocks.push(`
          <div class="month" style="width:${count * dayWidth()}px">
            <div class="month-name">${monthNames[monthStart.getMonth()]} ${monthStart.getFullYear()}</div>
            <div class="days">${days.join("")}</div>
          </div>
        `);
        cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
      }
      return blocks;
    }

    function weekendBands(range, height) {
      const bands = [];
      for (let i = 0; i < range.totalDays; i += 1) {
        const date = addDays(range.start, i);
        if (date.getDay() === 0 || date.getDay() === 6) {
          bands.push(`<div class="weekend-band" style="left:${i * dayWidth()}px;width:${dayWidth()}px;height:${height}px"></div>`);
        }
      }
      return bands;
    }

    function todayMarker(range, height) {
      const offset = diffDays(today, range.start);
      if (offset < 0 || offset > range.totalDays) return "";
      return `<div class="today-line" style="left:${offset * dayWidth()}px;height:${height}px"></div>`;
    }

    function scrollToToday(behavior = "auto") {
      const range = rangeForTasks(visibleTimelineItems());
      const left = Math.max(0, diffDays(today, range.start) * dayWidth() - board.clientWidth / 2);
      board.scrollTo({ left, behavior });
    }

    function scheduleScrollToToday(behavior = "auto") {
      requestAnimationFrame(() => scrollToToday(behavior));
    }

    function renderBars(range) {
      const rows = visibleRows();
      const rowIds = rows.map((project) => project.id);
      const tasks = visibleTimelineItems().filter((task) => rowIds.includes(task.projectId));
      barsEl.style.height = `${rows.length * rowHeight()}px`;
      barsEl.innerHTML = tasks.map((task) => {
        if (task.type === "ooo") {
          const member = data.members.find((item) => item.name === task.member) || data.members[0];
          const left = diffDays(parseDate(task.start), range.start) * dayWidth() + 8;
          const lane = currentLaneLayout.taskLanes.get(task.id) || 0;
          const top = rows.findIndex((item) => item.id === oooProjectId) * rowHeight() + 8 + (lane * 32);
          const width = daysBetween(parseDate(task.start), parseDate(task.end)) * dayWidth() - 16;
          const preview = [`OOO ${task.member}`, `${task.start}${task.end !== task.start ? ` - ${task.end}` : ""}`].join("\n");
          return `
            <div class="bar is-ooo" data-ooo-id="${task.id}" data-preview="${escapeAttr(preview)}" aria-label="${escapeAttr(preview)}" style="left:${left}px;top:${top}px;width:${Math.max(74, width)}px;border-color:${member?.color || "#111111"};background:${member?.color || "#ffffff"};color:${member?.textColor || "#111111"}">
              <span class="bar-title">${escapeHtml(task.member)}</span>
              <button class="bar-delete" data-delete-ooo="${task.id}" type="button" title="Elimina OOO" onclick="window.nokuDeleteOoo(this.dataset.deleteOoo); return false;">x</button>
            </div>
          `;
        }
        const project = data.projects.find((item) => item.id === task.projectId) || data.projects[0];
        const status = data.statuses.find((item) => item.name === task.status) || data.statuses[0];
        const left = diffDays(parseDate(task.start), range.start) * dayWidth() + 8;
        const lane = currentLaneLayout.taskLanes.get(task.id) || 0;
        const top = rows.findIndex((item) => item.id === task.projectId) * rowHeight() + 8 + (lane * 32);
        const width = daysBetween(parseDate(task.start), parseDate(task.end)) * dayWidth() - 16;
        const done = isDoneStatus(task.status) ? " is-done" : "";
        const subtasks = task.subtasks || [];
        const completedSubtasks = subtasks.filter((subtask) => subtask.done).length;
        const subtaskBadge = subtasks.length ? `<span class="bar-subtasks">${completedSubtasks}/${subtasks.length}</span>` : "";
        const compact = isCompactOverview();
        const memberNames = compact ? (task.members || []).slice(0, 1) : (task.members || []);
        const memberBadges = memberNames.map((memberName) => {
          const member = data.members.find((item) => item.name === memberName);
          return `<span class="bar-member" style="background:${member?.color || "#fff"};color:${member?.textColor || "#111111"}">${escapeHtml(memberName)}</span>`;
        }).join("");

          <div class="bar${done}" data-task-id="${task.id}" data-preview="${escapeAttr(preview)}" aria-label="${escapeAttr(preview)}" style="left:${left}px;top:${top}px;width:${Math.max(44, width)}px;border-color:${project.color}">

          </div>
        `;

    function openTask(taskId) {
      const task = data.tasks.find((item) => item.id === taskId);
      document.getElementById("taskTitle").textContent = task ? "Modifica task" : "Nuovo task";
      document.getElementById("taskId").value = task?.id || "";
      document.getElementById("taskName").value = task?.name || "";
      document.getElementById("taskProject").value = task?.projectId || data.projects[0]?.id || "";
      const selectedMembers = task?.members || [data.members[0]?.name].filter(Boolean);
      [...document.querySelectorAll("[data-task-member]")].forEach((input) => {
        input.checked = selectedMembers.includes(input.value);
      });
      document.getElementById("taskStart").value = task?.start || iso(today);
      document.getElementById("taskHasEnd").checked = Boolean(task?.hasEnd);
      document.getElementById("taskEnd").value = task?.end || task?.start || iso(today);
      updateTaskEndField();
      document.getElementById("taskStatus").value = task?.status || data.statuses[0]?.name || "";
      document.getElementById("taskNotes").value = task?.notes || "";
      renderSubtasks(task?.subtasks || []);
      document.getElementById("deleteTaskBtn").style.display = task ? "" : "none";

      endField.classList.toggle("is-hidden", !hasEnd);
      endInput.required = hasEnd;
      if (!hasEnd) endInput.value = startValue;
      if (hasEnd && !endInput.value) endInput.value = startValue;

    function hideTaskTooltip() {
      if (!taskTooltip) return;
      taskTooltip.classList.remove("open");
      taskTooltip.textContent = "";
      taskTooltip.style.transform = "translate(-9999px, -9999px)";
    }

    function moveTaskTooltip(event) {
      if (!taskTooltip || !taskTooltip.classList.contains("open")) return;
      const margin = 14;
      const rect = taskTooltip.getBoundingClientRect();
      let left = event.clientX + 14;
      let top = event.clientY + 14;
      if (left + rect.width + margin > window.innerWidth) left = event.clientX - rect.width - 14;
      if (top + rect.height + margin > window.innerHeight) top = event.clientY - rect.height - 14;
      taskTooltip.style.transform = `translate(${Math.max(margin, left)}px, ${Math.max(margin, top)}px)`;
    }

    function showTaskTooltip(event, bar) {
      if (!taskTooltip || !isCompactOverview() || !bar?.dataset.preview) return;
      taskTooltip.textContent = bar.dataset.preview;
      taskTooltip.classList.add("open");
      moveTaskTooltip(event);
    }

    function contextButton(action, label, hint, taskId) {
      return `<button type="button" data-context-action="${action}" data-task-id="${escapeAttr(taskId)}" onclick="window.nokuContextAction('${action}', this.dataset.taskId); return false;">${label}${hint ? ` <span>${hint}</span>` : ""}</button>`;
    }

    function openContextMenu(taskId, x, y) {
      hideTaskTooltip();
      contextTaskId = taskId;
      contextMenu.innerHTML = [
        contextButton("edit", "Modifica", "", taskId),
        contextButton("addSubtask", "Aggiungi sottotask", "+", taskId),
        contextButton("duplicate", "Duplica", "", taskId),
        contextButton("delete", "Elimina", "x", taskId)
      ].join("");

      const height = contextMenu.offsetHeight;

    function duplicateTask(taskId) {
      const task = data.tasks.find((item) => item.id === taskId);
      if (!task) return;
      const copy = {
        ...structuredClone(task),
        id: crypto.randomUUID ? crypto.randomUUID() : `task-${Date.now()}`,
        name: task.name,
        start: iso(addDays(parseDate(task.start), 1)),
        end: iso(addDays(parseDate(task.end), 1))
      };
      data.tasks.push(copy);
      saveData("Duplica task");
      render();
    }

    function deleteTask(taskId) {
      if (!taskId) return;
      data.tasks = data.tasks.filter((task) => task.id !== taskId);
      saveData("Elimina task");
      closeModals();
      hideContextMenu();
      render();
    }

    function deleteOoo(oooId) {
      if (!oooId) return;
      data.ooo = data.ooo.filter((entry) => entry.id !== oooId);
      saveData("Elimina OOO");
      render();
    }

    function deleteProject(projectId) {
      if (!projectId) return;
      data.projects = data.projects.filter((project) => project.id !== projectId);
      if (!data.projects.length) {
        data.projects.push({ id: "nuovo-progetto", name: "Nuovo progetto", color: colors[0] });
      }
      data.tasks = data.tasks.map((task) => task.projectId === projectId ? { ...task, projectId: data.projects[0].id } : task);
      saveData("Elimina progetto");
      render();
    }

    function deleteMember(name) {
      if (!name) return;
      data.members = data.members.filter((member) => member.name !== name);
      if (!data.members.length) {
        data.members.push({ name: "Team 1", color: colors[0] });
      }
      data.tasks = data.tasks.map((task) => {
        const members = (task.members || []).filter((member) => member !== name);
        return {
          ...task,
          members: members.length ? members : [data.members[0].name],
          subtasks: (task.subtasks || []).map((subtask) => ({
            ...subtask,
            members: (subtask.members || []).filter((member) => member !== name)
          }))
        };
      });
      data.ooo = data.ooo.filter((entry) => entry.member !== name);
      saveData("Elimina membro");
      render();
    }

    function deleteStatus(name) {
      if (!name) return;
      data.statuses = data.statuses.filter((status) => status.name !== name);
      if (!data.statuses.length) {
        data.statuses.push({ name: "Status 1", color: colors[0] });
      }
      data.tasks = data.tasks.map((task) => task.status === name ? { ...task, status: data.statuses[0].name } : task);
      saveData("Elimina status");
      render();
    }

    function runContextAction(action, taskId = contextTaskId) {
      const task = data.tasks.find((item) => item.id === taskId);
      if (!task) {
        hideContextMenu();
        return;
      }
      if (action === "edit") {
        hideContextMenu();
        openTask(task.id);
        return;
      }
      if (action === "addSubtask") {
        task.subtasks = task.subtasks || [];
        task.subtasks.push({ id: `sub-${Math.random().toString(16).slice(2)}`, title: "Nuovo sottotask", done: false, members: [] });
        saveData("Aggiungi sottotask");
        hideContextMenu();
        render();
        openTask(task.id);
        return;
      }
      if (action === "duplicate") {
        hideContextMenu();
        duplicateTask(task.id);
        return;
      }
      if (action === "delete") {
        deleteTask(task.id);
      }
    }

    window.nokuContextAction = (action, taskId = contextTaskId) => runContextAction(action, taskId);
    window.nokuDeleteTask = (taskId) => deleteTask(taskId);
    window.nokuDeleteOoo = (oooId) => deleteOoo(oooId);
    window.nokuDeleteProject = (projectId) => deleteProject(projectId);
    window.nokuDeleteMember = (name) => deleteMember(name);
